name: Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Each example has its own package.json and its own lockfile. We build them
# in a matrix to catch example-specific breakage (e.g. an example that drifts
# from the SDK's current API). Cache is scoped per example.
jobs:
  build:
    name: Build example ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ["01-cli", "02-telegram-bot", "03-next-dashboard"]
    defaults:
      run:
        working-directory: examples/${{ matrix.example }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: examples/${{ matrix.example }}/package-lock.json

      - name: Install
        run: npm install

      - name: Build
        run: npm run build --if-present

      - name: Dry-run (telegram bot)
        if: matrix.example == '02-telegram-bot'
        run: npm run dry-run
        env:
          HIRO_API_URL: https://api.hiro.so
