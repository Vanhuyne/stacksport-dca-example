name: Health check (weekly)

on:
  schedule:
    # Sunday 00:00 UTC — catches environment drift on GitHub runner images
    # and ensures @stacksport/dca-sdk still installs cleanly across our
    # full support matrix, independent of any code changes during the week.
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  reinstall:
    name: Fresh install (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install (cold)
        run: npm install

      - name: Smoke tests
        run: npm test
