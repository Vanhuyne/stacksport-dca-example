version: 2
updates:
  # Keep the SDK and dev deps current at the repo root (smoke + integration tests)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "npm"
    directory: "/examples/01-cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/examples/02-telegram-bot"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/examples/03-next-dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      types:
        patterns:
          - "@types/*"

  # Keep GitHub Actions versions current (actions/checkout, setup-node, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
